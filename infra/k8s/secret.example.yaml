# Plantilla — NO subir el secret real. En producción usar Sealed Secrets / SOPS
# / External Secrets. DATABASE_URL puede tomarse del secret que crea CloudNativePG
# (dietas-db-app) añadiendo  ?schema=dietas  a la cadena "uri".
apiVersion: v1
kind: Secret
metadata:
  name: dietas-secrets
  namespace: dietas
type: Opaque
stringData:
  DATABASE_URL: "postgresql://avante:CAMBIAR@dietas-db-rw.dietas.svc:5432/dietas?schema=dietas"
  AUTH_SECRET: "CAMBIAR-por-un-secreto-largo-y-aleatorio"
