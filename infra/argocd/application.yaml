# ArgoCD Application (GitOps): sincroniza infra/k8s desde el repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: avante-dietas
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/erickaguirre130294/avante-dietas-v2.git
    targetRevision: main
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: dietas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
