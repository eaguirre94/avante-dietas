name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: avante
          POSTGRES_PASSWORD: avante
          POSTGRES_DB: dietas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avante"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://avante:avante@localhost:5432/dietas?schema=dietas
      AUTH_SECRET: ci-secret-not-used-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:push
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  docker:
    name: Build & push images (GHCR)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: App image (runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Migrator image (Prisma CLI)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: build
          push: true
          tags: ghcr.io/${{ github.repository }}:migrator
      # ArgoCD detecta el nuevo tag en el repo (GitOps) y sincroniza el clúster.
